name: Deploy ItsJust

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for approved articles only
        run: |
          # Garante que nenhum artigo em draft/review seja buildado
          if grep -r 'status: draft\|status: review' src/content/articles/; then
            echo "⚠️  Artigos em draft ou review encontrados — build ignorado para segurança."
            exit 1
          fi
          echo "✅ Todos os artigos estão approved ou published."

      - name: Build Astro
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
